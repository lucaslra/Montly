name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: git.nlga.me/lucaslra/montly
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: git.nlga.me
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ github.token }}
          body: |
            ## Docker

            ```
            docker pull git.nlga.me/lucaslra/montly:${{ github.ref_name }}
            ```

            See [CHANGELOG.md](https://git.nlga.me/lucaslra/Montly/src/branch/main/CHANGELOG.md) for what changed.
