  <!-- Calendar header (darker blue) -->
  <rect x="96" y="144" width="320" height="96" rx="20" fill="#1d4ed8"/>
  <rect x="96" y="200" width="320" height="40" fill="#1d4ed8"/>

  <!-- Binding tabs -->
