# E2E test stack — not for production use.
# Run via: make e2e
services:
  app:
    build: .
    environment:
      DATA_DIR: /data
      PORT: "8080"
    volumes:
      - e2e_data:/data
    ports:
      - "127.0.0.1:18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/auth/setup || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    working_dir: /e2e
    volumes:
      - ./e2e:/e2e
    depends_on:
      app:
        condition: service_healthy
    environment:
      BASE_URL: http://app:8080
      ADMIN_USER: e2eadmin
      ADMIN_PASS: e2epassword123
    command: sh -c "npm install --silent && npx playwright test"

volumes:
  e2e_data:
